<!doctype html>
<!-- Robert Hubskyi -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habitations | Hidden Heaven</title>
    <link rel="stylesheet" href="css/index.css" />

    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>
  <body>
    <header
      data-hx-trigger="load"
      data-hx-swap="outerHTML"
      data-hx-get="header.partial.html"
    ></header>

    <main class="habitations">
      <section
        data-hx-trigger="load"
        data-hx-swap="outerHTML"
        data-hx-get="habitations.hero.partial.html"
      ></section>

      <section
        data-hx-trigger="load"
        data-hx-swap="outerHTML"
        data-hx-get="habitations.tent-listings.partial.html"
      ></section>

      <section
        data-hx-trigger="load"
        data-hx-swap="outerHTML"
        data-hx-get="habitations.special-offers.partial.html"
      ></section>
    </main>

    <footer
      data-hx-trigger="load"
      data-hx-swap="outerHTML"
      data-hx-get="global.footer.partial.html"
    ></footer>

    <script src="js/index.js"></script>
  </body>
</html>
